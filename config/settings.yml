plugins:
  digest_eligibility_rules_enabled:
    default: false
    client: false

  digest_eligibility_rules_debug:
    default: false
    client: false

  digest_eligibility_rules_apply_includes:
    default: true
    client: false

  digest_eligibility_rules_apply_excludes:
    default: true
    client: false

  digest_eligibility_rules_groups_json:
    default: "[]"
    type: text
    textarea: true
    client: false

  digest_eligibility_rules_excludes_json:
    default: "[]"
    type: text
    textarea: true
    client: false

  # emails_list sources (UNLIMITED)
  # [
  #   {"name":"A","table":"emails_list_a","column":"email"},
  #   {"name":"B","table":"emails_list_b","column":"email"}
  # ]
  digest_eligibility_emails_lists_json:
    default: "[]"
    type: text
    textarea: true
    client: false

  # emails_list caching
  digest_eligibility_emails_list_l1_cache_enabled:
    default: true
    client: false

  digest_eligibility_emails_list_l2_cache_enabled:
    default: true
    client: false

  digest_eligibility_emails_list_cache_ttl_seconds:
    default: 900
    client: false

  # Optional jitter to reduce stampede when TTL expires (0 disables)
  digest_eligibility_emails_list_cache_ttl_jitter_seconds:
    default: 30
    client: false

  # DB paging + safety cap
  digest_eligibility_emails_list_page_size:
    default: 50000
    client: false

  digest_eligibility_emails_list_max_rows:
    default: 0
    client: false

  digest_eligibility_rules_skipped_attempted_mode:
    default: random_future
    client: false
    type: enum
    choices:
      - now
      - random_future

  # Shared cache key prefix (bump to hard-bust caches)
  digest_eligibility_emails_list_cache_prefix:
    default: "der:emails_list:v1"
    client: false

  # SQL-query-based email lists (dynamic, per-list configurable TTL)
  # Each entry: {"name":"my_list","query":"SELECT email FROM some_table WHERE ...","ttl_seconds":900}
  # The query MUST return an `email` column. No bind parameters allowed.
  # Names are referenced in group rules exactly like static emails_list names.
  # ttl_seconds defaults to digest_eligibility_emails_list_cache_ttl_seconds when omitted or 0.
  digest_eligibility_sql_lists_json:
    default: "[]"
    type: text
    textarea: true
    client: false

  # ---------------------------------------------------------------------------
  # Custom base query mode
  # When enabled, the plugin replaces Discourse's default target_user_ids query
  # with the SQL supplied below. All existing include/exclude rule logic still
  # runs on top of whatever user IDs your query returns (unless
  # digest_eligibility_custom_query_apply_rules is turned off).
  # ---------------------------------------------------------------------------

  # Master switch: replace Discourse's built-in candidate query with your own.
  digest_eligibility_custom_query_mode:
    default: false
    client: false

  # The SQL query that returns the candidate user IDs.
  # Must be a SELECT. Must return a column named `user_id` or `id`.
  # Additional columns are allowed and ignored.
  # No bind parameters. No write statements.
  # Example: SELECT id FROM users WHERE ...
  digest_eligibility_custom_query_sql:
    default: ""
    type: text
    textarea: true
    client: false

  # Failsafe: even if your query returns a user, skip them if digest emails are
  # disabled for that account (email_digests=false or digest_after_minutes=0)
  # or the account is suspended / not activated.
  # Strongly recommended to keep this on.
  digest_eligibility_custom_query_failsafe:
    default: true
    client: false

  # Apply include/exclude rule groups (digest_eligibility_rules_groups_json /
  # digest_eligibility_rules_excludes_json) on top of the custom query results.
  # When off, the custom query output (after failsafe) is used as-is with no
  # further include/exclude filtering.
  digest_eligibility_custom_query_apply_rules:
    default: true
    client: false

  # Failsafe: remove users from the custom query results who already received
  # (or had a digest attempt recorded) within the last N hours.
  # Uses user_stats.digest_attempted_at — the same column Discourse stamps on
  # every digest send or skipped-user mark.
  digest_eligibility_custom_query_recent_digest_failsafe:
    default: true
    client: false

  # How many hours back to look when applying the recent-digest failsafe above.
  digest_eligibility_custom_query_recent_digest_hours:
    default: 23
    client: false

  # Failsafe: remove users from the custom query results who were sent any email
  # within the last N hours. Uses users.last_emailed_at — updated on every
  # outbound email, not just digests.
  digest_eligibility_custom_query_recent_emailed_failsafe:
    default: false
    client: false

  # How many hours back to look when applying the recent-emailed failsafe above.
  digest_eligibility_custom_query_recent_emailed_hours:
    default: 23
    client: false

  # When enabled, bypasses the two silent-skip checks inside Jobs::UserEmail
  # for digest emails:
  #   1. digest_attempted_at > delay.minutes.ago  → skipped
  #   2. last_seen_at > delay.minutes.ago          → skipped
  # Use this when your custom query already handles these conditions and you
  # want all returned users to reach content generation.
  # Has no effect when custom query mode is disabled.
  digest_eligibility_bypass_user_email_digest_checks:
    default: false
    client: false

  # When enabled, logs one line per user showing the digest_attempted_at and
  # last_seen_at values that were bypassed. Only active when
  # digest_eligibility_bypass_user_email_digest_checks is also enabled.
  # Turn off in production once you have confirmed the bypass is working.
  digest_eligibility_bypass_user_email_digest_checks_log:
    default: false
    client: false
